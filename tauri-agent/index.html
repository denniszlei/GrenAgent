<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GrenAgent</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0b0d12;
      }
      /* 静态首屏占位：JS bundle 解析期间即可见，React 挂载后被自动替换。 */
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 10000;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0b0d12;
      }
      #boot-splash .ring {
        width: 38px;
        height: 38px;
        border: 3px solid rgba(255, 255, 255, 0.14);
        border-top-color: #4c8bf5;
        border-radius: 50%;
        animation: boot-spin 0.8s linear infinite;
        /* 事件穿透到带 drag-region 的 #boot-splash，让 spinner 区域也能拖动窗口。 */
        pointer-events: none;
      }
      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <!-- data-tauri-drag-region：JS 解析期的首屏也能拖动窗口（无系统标题栏）。 -->
      <div id="boot-splash" data-tauri-drag-region><div class="ring"></div></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
